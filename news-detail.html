<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAE - သတင်းအသေးစိတ်</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Myanmar:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'Noto Sans Myanmar', sans-serif !important; }
        .text-justify { text-align: justify; }
        .nav-link:hover::after { width: 100%; left: 0; }
        .nav-link::after { content: ''; position: absolute; width: 0; height: 2px; bottom: -2px; left: 50%; background: #0284c7; transition: all 0.3s; }
    </style>
</head>
<body class="bg-slate-50">

    <!-- Navigation -->
    <nav class="bg-white shadow-sm sticky top-0 z-50 border-b-2 border-sky-600">
        <div class="container mx-auto px-6 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-2 group cursor-pointer" onclick="window.location.href='index.html'">
                <div class="w-9 h-9 bg-sky-600 rounded text-white flex items-center justify-center font-black group-hover:rotate-12 transition-transform">DAE</div>
                <span class="text-sky-950 font-black text-lg uppercase tracking-tighter">DAE Myanmar</span>
            </div>
            <div class="hidden md:flex space-x-8 text-sky-900 font-bold text-sm items-center">
                <a href="index.html" class="relative nav-link">ပင်မစာမျက်နှာ</a>
                <a href="news.html" class="relative nav-link text-sky-600">သတင်းများ</a>
                <a href="index.html#programs" class="relative nav-link">လုပ်ငန်းစဉ်များ</a>
                <a href="index.html#contact" class="relative nav-link">ဆက်သွယ်ရန်</a>
            </div>
        </div>
    </nav>

    <!-- News Content -->
    <main class="py-16 container mx-auto px-4 max-w-4xl">
        <div id="newsDetailContent" class="bg-white p-6 md:p-12 rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
            <!-- Loading -->
            <div class="animate-pulse space-y-8">
                <div class="h-8 bg-slate-200 rounded w-3/4"></div>
                <div class="h-64 bg-slate-200 rounded"></div>
                <div class="space-y-3">
                    <div class="h-4 bg-slate-200 rounded"></div>
                    <div class="h-4 bg-slate-200 rounded"></div>
                    <div class="h-4 bg-slate-200 rounded w-5/6"></div>
                </div>
            </div>
        </div>
        <div class="mt-10 text-center">
            <a href="news.html" class="inline-block px-8 py-3 bg-sky-600 text-white font-bold rounded-full hover:bg-sky-700 transition shadow-lg">သတင်းများအားလုံးသို့ ပြန်သွားရန်</a>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = { apiKey: "AIzaSyBoEpxAm2L_AeG8BkqUd-bMawj6-SNqt3Q", authDomain: "dae-web-portal.firebaseapp.com", projectId: "dae-web-portal", storageBucket: "dae-web-portal.firebasestorage.app", messagingSenderId: "675669637539", appId: "1:675669637539:web:5ad6d6dd5b990cbee18216" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const newsId = urlParams.get('id');

        if (newsId) {
            getDoc(doc(db, "news", newsId)).then((snap) => {
                const content = document.getElementById('newsDetailContent');
                if (snap.exists()) {
                    const data = snap.data();
                    
                    // Main Image & Description
                    let html = `
                        <p class="text-sky-600 font-bold text-xs mb-4 uppercase tracking-widest">${data.date || 'သတင်း'}</p>
                        <h1 class="text-2xl md:text-4xl font-black text-slate-800 mb-8 leading-tight">${data.title}</h1>
                        <img src="${data.image}" class="w-full h-auto rounded-2xl mb-10 shadow-lg">
                        <div class="text-slate-700 text-lg leading-relaxed whitespace-pre-line mb-12 text-justify">${data.description}</div>
                    `;

                    // Multi-Image Gallery (if exists)
                    if (data.images && data.images.length > 1) {
                        html += `
                            <div class="border-t border-slate-100 pt-10">
                                <h3 class="text-xl font-black text-slate-800 mb-6">သတင်းမှတ်တမ်းဓာတ်ပုံများ</h3>
                                <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                                    ${data.images.map(img => `<img src="${img}" class="w-full h-40 object-cover rounded-xl shadow-sm hover:scale-105 transition duration-300 cursor-pointer" onclick="window.open('${img}')">`).join('')}
                                </div>
                            </div>
                        `;
                    }

                    content.innerHTML = html;
                    document.title = "DAE - " + data.title;
                } else {
                    content.innerHTML = '<p class="text-center text-slate-500 py-10">သတင်း ရှာမတွေ့ပါ။</p>';
                }
            }).catch(err => {
                console.error(err);
                document.getElementById('newsDetailContent').innerHTML = '<p class="text-center text-red-500 py-10">Error loading news.</p>';
            });
        } else {
            window.location.href = 'news.html';
        }
    </script>
</body>
</html>
